<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Teal rounded square background -->
  <rect width="32" height="32" rx="7" fill="#0d9488"/>
  <!-- "5" -->
  <text x="3" y="15" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="12" fill="white">5</text>
  <!-- "0" -->
  <text x="11.5" y="15" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="12" fill="white">0</text>
  <!-- "8" — slightly larger, overlapping the checkmark area -->
  <text x="20" y="15" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="12" fill="white">8</text>
  <!-- Teal checkmark circle in bottom right -->
  <circle cx="23" cy="23" r="6.5" fill="#0d9488" stroke="white" stroke-width="1.5"/>
  <polyline points="19.5,23 22,25.5 26.5,20" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
